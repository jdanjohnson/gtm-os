kind: playbook
id: lead-scoring-iteration
name: Lead Scoring Model Iteration
description: Build, test, and iterate a lead scoring model from historical win/loss data. Compounds learning as more deals close.
category: sales
tags: [scoring, qualification, analytics, pipeline, compounding]
source_repo: OneWave-AI/claude-skills

outcome:
  goal: Build a lead scoring model that predicts deal close probability within 10% accuracy
  hypothesis: A scoring model trained on historical win/loss data with firmographic + behavioral + intent signals outperforms gut-feel qualification.
  success_metrics:
    - metric: prediction_accuracy
      target: "Within 10% of actual close rate per score bucket"
    - metric: ae_time_savings
      target: ">20% reduction in time spent on unqualified leads"
    - metric: model_improvement
      target: "Accuracy improves each quarter as more deals close"

knowledge:
  - id: historical-deals
    description: Won/lost deals with company attributes, engagement data, and outcome
    required: true
  - id: scoring-methodology
    description: How to weight firmographic, behavioral, and intent signals
    required: true
  - id: icp-definition
    description: Current ICP to validate model alignment
    required: true

workflows:
  - inbound-scoring-pipeline

skills:
  - lead-scoring-model
  - intent-signal-aggregator
  - deal-review-framework

tools:
  - id: acrm-cli
    purpose: Query historical deal data and apply scores to current pipeline

agent:
  role: Revenue Operations Analyst
  process: sequential
  phases: [design, build, execute, measure, learn]

experiments:
  - name: Signal Weight Test
    description: Firmographic-heavy vs behavioral-heavy vs intent-heavy weighting, measure prediction accuracy
  - name: Threshold Test
    description: Score >50 vs >60 vs >70 as "qualified" threshold, measure AE acceptance rate
  - name: Quarterly Retrain
    description: Retrain model each quarter with new closed deals, measure accuracy improvement
