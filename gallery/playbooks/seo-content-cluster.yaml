kind: playbook
id: seo-content-cluster
name: SEO Content Cluster Experiment
description: Run a content cluster experiment — pillar page + supporting articles — targeting a keyword cluster. Measures ranking velocity, organic traffic, and lead generation.
category: content
tags: [seo, content, organic, inbound]
source_repo: TheCraigHewitt/seomachine

outcome:
  goal: Rank in top 3 for a target keyword cluster and generate organic inbound leads
  hypothesis: A pillar page with 5 supporting articles published over 4 weeks will rank top-10 faster than standalone articles, measured by impressions and clicks in GSC.
  success_metrics:
    - metric: ranking_position
      target: "Top 10 within 6 weeks, top 3 within 12 weeks"
    - metric: organic_clicks_per_week
      target: ">100 after week 8"
    - metric: content_quality_score
      target: ">70 on seomachine scorer"

knowledge:
  - id: brand-voice
    description: Tone, vocabulary, examples of on-brand writing
    required: true
  - id: seo-guidelines
    description: Target keywords, density rules, internal linking map, meta standards
    required: true
  - id: content-structure
    description: H1/H2/H3 hierarchy, intro hooks, CTA placement, section length targets
    required: true
  - id: internal-links-map
    description: All existing content URLs with anchor text for internal linking
    required: false
  - id: ai-pattern-removal
    description: Rules for scrubbing AI watermarks and cliche patterns
    required: true

workflows:
  - seo-research-pipeline
  - content-write-optimize-publish

skills:
  - seo-optimizer
  - seo-keyword-cluster-builder
  - brand-voice-analyzer
  - content-repurposer
  - landing-page-copywriter

tools:
  - id: web-search
    purpose: SERP analysis — top 5 articles for target keyword
  - id: content-scorer
    purpose: Score across Humanity (30%), Specificity (25%), Structure (20%), SEO (15%), Readability (10%)
  - id: wordpress-api
    purpose: Publish draft with Yoast SEO metadata

agent:
  role: SEO Content Strategist
  process: sequential
  phases: [design, build, execute, measure, learn]

experiments:
  - name: Content Length Test
    description: 1500 vs 2500 vs 4000 word articles for same keyword, measure ranking velocity
  - name: Research Depth Test
    description: SERP-only vs SERP+Social research, measure content uniqueness
  - name: Publishing Cadence Test
    description: 2x/week vs daily, measure domain authority and indexing speed
  - name: Cluster vs Standalone Test
    description: Pillar + 5 supporting vs 6 standalone articles, measure cluster ranking
