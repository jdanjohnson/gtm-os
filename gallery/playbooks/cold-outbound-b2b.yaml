kind: playbook
id: cold-outbound-b2b
name: B2B Cold Outbound Campaign
description: Run a multi-touch outbound experiment against a defined B2B ICP — from prospecting through enrichment to sequenced email outreach.
category: outbound
tags: [sales, email, prospecting, b2b, outbound]
source_repo: kathrynwu/GTMbrain

outcome:
  goal: Book qualified meetings from cold outbound email to B2B prospects
  hypothesis: A focused list of ~200 ICP-fit accounts with senior buyers and why-now signals will outperform a 5000-row export measured by meetings booked per 100 contacts.
  success_metrics:
    - metric: reply_rate
      target: ">3%"
    - metric: meetings_booked_per_100
      target: ">5"
    - metric: positive_reply_ratio
      target: ">40% of replies are positive"

knowledge:
  - id: icp-definition
    description: Geography, vertical, company size, buyer persona, reject rules, approved-row standard
    required: true
  - id: outreach-templates
    description: Subject lines, first-touch templates, follow-up cadences, CTAs
    required: true
  - id: brand-voice
    description: Tone and messaging guidelines for outbound copy
    required: true
  - id: enrichment-requirements
    description: Required fields before outreach — email, phone, website, qualification signals
    required: true

workflows:
  - prospect-enrichment
  - email-sequence-send
  - crm-activity-logging

skills:
  - cold-email-sequence-generator
  - personalization-at-scale
  - lead-scoring-model
  - objection-pattern-detector

tools:
  - id: apollo-api
    purpose: Find contacts at target companies by title, seniority, and signals
  - id: email-sender
    purpose: Send multi-touch sequences via Instantly, Smartlead, or SMTP
  - id: acrm-cli
    purpose: Log leads, activity, and outcomes to CRM

agent:
  role: GTM Outbound Operator
  process: sequential
  phases: [design, build, execute, measure, learn]

experiments:
  - name: ICP Test
    description: Define 3 different ICPs for same vertical, prospect 50 leads each, measure reply rates
  - name: Channel Test
    description: Email-first vs call-first vs LinkedIn-first for same ICP
  - name: Copy Test
    description: A/B test 3 different first-touch emails, measure open + reply rates
  - name: Cadence Test
    description: 3-touch vs 5-touch vs 7-touch sequences, measure meeting conversion
  - name: Geography Test
    description: Same ICP across 3 cities, measure which converts best
  - name: Persona Test
    description: Owner vs VP Sales vs RevOps as target persona, measure response quality
