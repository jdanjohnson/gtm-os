kind: playbook
id: intent-signal-monitoring
name: Buyer Intent Signal Monitoring
description: Monitor buyer intent signals across the web — job postings, tech stack changes, funding announcements, content engagement — and feed high-intent accounts into pipeline.
category: intelligence
tags: [intent, signals, monitoring, pipeline, recurring]
source_repo: OneWave-AI/claude-skills

outcome:
  goal: Identify accounts showing buying intent before they enter a formal evaluation
  hypothesis: Accounts with 3+ intent signals (hiring, funding, tech migration) convert to meetings at 4x the rate of cold-sourced accounts.
  success_metrics:
    - metric: intent_signals_per_week
      target: ">20 high-confidence signals"
    - metric: signal_to_meeting_rate
      target: ">10% of signaled accounts accept a meeting"
    - metric: pipeline_from_intent
      target: ">30% of new pipeline attributed to intent signals"

knowledge:
  - id: signal-definitions
    description: What counts as a buying signal — hiring for roles, tech stack changes, funding, content consumption
    required: true
  - id: icp-definition
    description: Which accounts to monitor for signals
    required: true
  - id: signal-scoring
    description: How to weight different signal types and recency
    required: true

workflows:
  - competitor-monitoring-sweep
  - inbound-scoring-pipeline

skills:
  - intent-signal-aggregator
  - lookalike-customer-finder
  - lead-scoring-model

tools:
  - id: changedetection-io
    purpose: Monitor career pages and tech stack pages for changes
  - id: web-search
    purpose: Search for funding announcements and press releases
  - id: llm-scraper
    purpose: Extract structured hiring and product data from company pages

agent:
  role: Intent Signal Analyst
  process: polling
  interval: daily
  phases: [design, build, execute, measure, learn]

experiments:
  - name: Signal Type Test
    description: Hiring signals vs funding signals vs tech stack signals, measure which predicts buying best
  - name: Signal Freshness Test
    description: Signals from last 7 days vs last 30 days, measure meeting acceptance rate
  - name: Multi-Signal Threshold
    description: 1 signal vs 2+ signals vs 3+ signals required before outreach, measure conversion
