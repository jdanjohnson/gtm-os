kind: playbook
id: content-repurposing-engine
name: Content Repurposing Engine
description: Take one piece of content (blog post, podcast, webinar) and produce 8+ formats — X posts, LinkedIn posts, newsletter, video hooks, email snippets, slide decks.
category: content
tags: [content, repurposing, social, distribution, recurring]
source_repo: OneWave-AI/claude-skills

outcome:
  goal: Maximize distribution of every content asset by repurposing into every relevant channel
  hypothesis: Repurposing one blog post into 8+ formats within 24 hours of publication generates 5x the total impressions of the original post alone.
  success_metrics:
    - metric: formats_per_asset
      target: ">8 distinct formats per content piece"
    - metric: total_impressions
      target: ">5x original post impressions across all formats"
    - metric: production_time
      target: "<30 minutes per repurposing cycle"

knowledge:
  - id: brand-voice
    description: Platform-specific tone rules (LinkedIn = professional, X = punchy, newsletter = conversational)
    required: true
  - id: platform-constraints
    description: Character limits, image sizes, hashtag rules per platform
    required: true
  - id: content-calendar
    description: Publishing schedule and platform priority order
    required: false

workflows:
  - content-repurposing-pipeline

skills:
  - content-repurposer
  - social-repurposer
  - social-selling-content-generator
  - linkedin-post-optimizer
  - email-template-generator
  - podcast-content-suite

tools:
  - id: web-search
    purpose: Find trending hooks and angles relevant to the content topic
  - id: llm-scraper
    purpose: Extract key quotes and data points from original content

agent:
  role: Content Distribution Operator
  process: sequential
  phases: [design, build, execute, measure, learn]

experiments:
  - name: Platform Priority Test
    description: LinkedIn-first vs X-first vs newsletter-first distribution, measure engagement
  - name: Format Count Test
    description: 5 formats vs 8 formats vs 12 formats, measure diminishing returns
  - name: Timing Test
    description: Same-day repurposing vs 3-day staggered release, measure total reach
