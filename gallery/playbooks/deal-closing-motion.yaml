kind: playbook
id: deal-closing-motion
name: Deal Closing Motion
description: Run a structured closing strategy — map the buying committee, handle objections, drive urgency, and close.
category: sales
tags: [sales, closing, deal-management, pipeline]
source_repo: OneWave-AI/claude-skills

outcome:
  goal: Increase close rate on qualified pipeline by running a structured closing motion
  hypothesis: Deals with mapped buying committees and pre-handled objections close at 2x the rate of unstructured follow-up.
  success_metrics:
    - metric: close_rate
      target: ">30% of qualified pipeline"
    - metric: sales_cycle_days
      target: "<45 days average"
    - metric: deal_value
      target: "No unnecessary discounting (>90% of list price)"

knowledge:
  - id: deal-review-framework
    description: MEDDIC/BANT assessment with risk scoring criteria
    required: true
  - id: objection-patterns
    description: Common objection patterns mined from lost deals
    required: true
  - id: buying-committee-map
    description: Roles (champion, economic buyer, technical evaluator, blocker) and engagement strategy per role
    required: true
  - id: competitive-battlecards
    description: Per-competitor positioning, weaknesses, displacement talk tracks
    required: false

workflows:
  - deal-qualification-pipeline
  - crm-activity-logging

skills:
  - deal-closer-playbook
  - deal-review-framework
  - deal-momentum-analyzer
  - champion-identifier
  - objection-pattern-detector
  - sales-call-prep-assistant

tools:
  - id: acrm-cli
    purpose: Track deal stage, activity, and buying committee contacts
  - id: email-sender
    purpose: Send follow-up and nurture sequences to buying committee

agent:
  role: Deal Strategist
  process: sequential
  phases: [design, build, execute, measure, learn]

experiments:
  - name: MEDDIC vs BANT
    description: Run MEDDIC qualification on 20 deals vs BANT on 20 deals, measure close rate
  - name: Multi-Thread vs Single-Thread
    description: Engage 3+ buying committee members vs champion-only, measure deal velocity
  - name: Objection Pre-Handle Test
    description: Proactively address top 3 objections vs reactive handling, measure close rate
