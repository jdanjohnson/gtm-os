kind: playbook
id: podcast-content-motion
name: Podcast-to-Content Marketing Motion
description: Transform podcast episodes into a full content marketing motion — blog posts, social clips, newsletter sections, quote graphics, SEO articles.
category: content
tags: [podcast, content, repurposing, distribution, recurring]
source_repo: OneWave-AI/claude-skills

outcome:
  goal: Extract maximum marketing value from every podcast episode
  hypothesis: Each podcast episode can generate 15+ content pieces across 5 channels, producing more impressions than the episode itself.
  success_metrics:
    - metric: content_pieces_per_episode
      target: ">15"
    - metric: total_impressions
      target: ">10x episode listens across all derived content"
    - metric: production_time
      target: "<45 minutes per episode repurposing cycle"

knowledge:
  - id: brand-voice
    description: Platform-specific tone adaptation rules
    required: true
  - id: content-calendar
    description: Publishing schedule for derived content
    required: false
  - id: episode-format
    description: Standard podcast episode structure and recurring segments
    required: false

workflows:
  - content-repurposing-pipeline

skills:
  - podcast-content-suite
  - content-repurposer
  - social-repurposer
  - seo-keyword-cluster-builder
  - email-template-generator

tools:
  - id: web-search
    purpose: Find trending angles related to episode topics

agent:
  role: Podcast Content Producer
  process: sequential
  phases: [design, build, execute, measure, learn]

experiments:
  - name: Clip Format Test
    description: Audio clips vs quote graphics vs short video, measure engagement per platform
  - name: Publish Timing Test
    description: All content same day vs drip over 5 days, measure total reach
  - name: SEO Integration Test
    description: Episode-derived blog post vs standalone SEO article, measure ranking speed
