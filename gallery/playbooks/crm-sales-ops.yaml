kind: playbook
id: crm-sales-ops
name: CRM-Driven Sales Operations
description: Run automated sales operations — call prep, follow-up drafting, stale deal recovery, pipeline hygiene — through a headless CRM.
category: sales
tags: [crm, sales-ops, pipeline, follow-up, recurring]
source_repo: cluster-software/agent-crm

outcome:
  goal: Keep pipeline healthy and reps productive by automating CRM hygiene and follow-up
  hypothesis: Automated call prep + follow-up drafting + stale deal sweeps increase rep productivity by 30% measured by meetings held per rep per week.
  success_metrics:
    - metric: rep_meetings_per_week
      target: ">12 meetings held per rep"
    - metric: stale_deal_recovery_rate
      target: ">15% of stale deals re-engaged"
    - metric: follow_up_response_rate
      target: ">20% of AI-drafted follow-ups get a reply"

knowledge:
  - id: crm-schema
    description: "Attio model: people, companies, deals, posts, transcripts"
    required: true
  - id: call-prep-template
    description: Structure for pre-call briefs — history, recent activity, discovery questions
    required: true
  - id: follow-up-voice
    description: User's writing voice for follow-up drafts
    required: true
  - id: pipeline-hygiene-rules
    description: Stale deal thresholds, activity scoring weights, stage duration limits
    required: true

workflows:
  - crm-activity-logging
  - deal-qualification-pipeline

skills:
  - sales-call-prep-assistant
  - deal-momentum-analyzer
  - pipeline-health-analyzer
  - rep-performance-scorecard

tools:
  - id: acrm-cli
    purpose: All CRM operations — init, import, query, export
  - id: transcript-provider
    purpose: Granola, Otter, Fireflies, Fathom, Zoom — pluggable
  - id: email-sender
    purpose: Send follow-up drafts after review

agent:
  role: Sales Operations Agent
  process: polling
  interval: daily
  phases: [design, build, execute, measure, learn]

experiments:
  - name: Follow-Up Cadence
    description: 2-day vs 5-day vs 7-day auto-follow-up intervals, measure response rate
  - name: Call Prep Impact
    description: AI call briefs vs no prep, measure meeting-to-opportunity conversion
  - name: Stale Deal Recovery
    description: Different re-engagement templates for 14d vs 30d vs 60d stale deals
