kind: playbook
id: landing-page-conversion
name: Landing Page Conversion Experiment
description: Run conversion copy experiments on landing pages — test headlines, CTAs, social proof, page structure — using frameworks like PAS, AIDA, StoryBrand.
category: conversion
tags: [landing-page, conversion, copywriting, a-b-testing]
source_repo: OneWave-AI/claude-skills

outcome:
  goal: Increase landing page conversion rate through systematic copy and structure experiments
  hypothesis: Landing pages written with PAS framework and specific social proof convert at 2x the rate of generic feature-focused pages.
  success_metrics:
    - metric: conversion_rate
      target: ">5% visitor-to-signup"
    - metric: bounce_rate
      target: "<40%"
    - metric: time_on_page
      target: ">90 seconds average"

knowledge:
  - id: copywriting-frameworks
    description: PAS, AIDA, StoryBrand, Before-After-Bridge frameworks with examples
    required: true
  - id: brand-voice
    description: Tone, vocabulary, and messaging guidelines
    required: true
  - id: conversion-benchmarks
    description: Industry benchmarks for landing page metrics
    required: false

workflows:
  - content-write-optimize-publish

skills:
  - landing-page-copywriter
  - seo-optimizer
  - brand-voice-analyzer

tools:
  - id: web-search
    purpose: Research competitor landing pages for positioning
  - id: llm-scraper
    purpose: Extract competitor copy patterns and social proof

agent:
  role: Conversion Copywriter
  process: sequential
  phases: [design, build, execute, measure, learn]

experiments:
  - name: Framework Test
    description: PAS vs AIDA vs StoryBrand for same product, measure conversion rate
  - name: Headline Test
    description: Benefit-led vs pain-led vs question-led headlines, measure click-through
  - name: Social Proof Test
    description: Customer logos vs testimonials vs case study stats, measure trust and conversion
  - name: CTA Test
    description: "Start Free Trial" vs "See Demo" vs "Get Started", measure click rate
