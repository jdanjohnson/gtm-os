kind: tool
id: changedetection-io
name: Change Detection
description: Self-hosted website change monitoring with alerts.
category: monitoring
tags:
- monitoring
- changes
- alerts
- recurring
source_repo: dgtlmoon/changedetection.io
install: docker run -d -p 5000:5000 ghcr.io/dgtlmoon/changedetection.io
capabilities:
- Monitor any URL for changes
- Visual diff comparison
- Notification to 90+ services (Slack, Discord, email, webhook)
- CSS/XPath/JSONPath filters
- Scheduled checks with configurable intervals
- Proxy and browser rendering support
integration_pattern: self_hosted_api
