kind: workflow
id: competitor-monitoring-sweep
name: Competitor Monitoring Sweep
description: Run a scheduled sweep across competitor websites, job boards, social presence, and news — collect signals and generate a change report.
category: intelligence
tags: [monitoring, competitor, signals, recurring]
source_repos:
  - dgtlmoon/changedetection.io
  - calesthio/Crucix

steps:
  - name: Check website changes
    tool: changedetection-io
    input: competitor_urls
    description: Check monitored competitor URLs for pricing, product, and content changes

  - name: Check job postings
    tool: web-search
    input: competitor_careers_urls
    description: Monitor competitor careers pages for new roles (expansion/contraction signals)

  - name: Check social presence
    tool: maigret
    input: competitor_employee_usernames
    description: Track competitor employee social activity and new public profiles
    optional: true

  - name: Check news and press
    tool: web-search
    input: competitor_names
    config:
      recency: 7d
      sources: [news, press-releases]
    description: Search for recent competitor news, funding, partnerships

  - name: Aggregate signals
    input: all_changes
    description: Deduplicate, score significance, and categorize all detected changes

  - name: Generate change report
    output: intelligence_brief
    description: Produce structured brief — signal, context, implication, recommended action

tools: [changedetection-io, web-search, maigret]
skills: []
