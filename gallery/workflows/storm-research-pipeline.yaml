kind: workflow
id: storm-research-pipeline
name: STORM Research Pipeline
description: Run the STORM multi-stage research pipeline — knowledge curation via simulated expert conversations, outline generation, article writing with citations, polishing.
category: research
tags: [research, storm, citations, reports]
source_repos:
  - stanford-oval/storm

steps:
  - name: Knowledge curation
    description: Simulate expert conversations to gather diverse perspectives on the topic. Search the web for supporting evidence.
    tool: web-search
    config:
      providers: [bing, serper, brave, tavily, google, duckduckgo]
      max_sources: 30

  - name: Generate outline
    input: information_table, conversation_history
    description: Create hierarchical outline from collected research — sections, subsections, dependencies

  - name: Write article sections
    input: outline, information_table
    description: Write each section with inline citations, parallelizing where possible

  - name: Polish article
    input: draft_article
    description: Add lead section, remove duplicates, verify citation consistency

  - name: Output report
    output: research_report
    format: markdown_with_citations
    description: Final report with table of contents, inline citations, and source list

tools: [web-search, vector-store]
skills: []
