kind: workflow
id: content-repurposing-pipeline
name: Content Repurposing Pipeline
description: Take one content asset and produce 8+ derivative formats for multi-channel distribution.
category: content
tags: [content, repurposing, distribution, social]
source_repos:
  - OneWave-AI/claude-skills

steps:
  - name: Analyze source content
    input: source_content
    description: Extract key themes, quotes, data points, and takeaways from the original

  - name: Generate X posts
    skill: social-repurposer
    config: { platform: x, count: 5 }
    description: Create 5 X/Twitter posts — hooks, threads, quote cards

  - name: Generate LinkedIn posts
    skill: linkedin-post-optimizer
    config: { count: 3 }
    description: Create 3 LinkedIn posts — thought leadership, story, data-driven

  - name: Generate newsletter section
    skill: email-template-generator
    config: { format: newsletter_section }
    description: Create newsletter blurb with link back to original

  - name: Generate video hooks
    input: key_quotes
    description: Create 3 short video script hooks from the strongest quotes

  - name: Generate email snippets
    skill: email-template-generator
    config: { format: nurture_snippet }
    description: Create email snippets for sales nurture sequences

  - name: Generate slide content
    input: key_themes
    description: Create 5-slide summary deck content

  - name: Generate SEO derivative
    skill: seo-keyword-cluster-builder
    input: source_topics
    description: Identify related keywords for derivative SEO articles
    optional: true

  - name: Output content package
    output: content_package
    description: All derivative content pieces with platform labels and publishing order

tools: []
skills: [social-repurposer, linkedin-post-optimizer, email-template-generator, seo-keyword-cluster-builder]
