# Tone dials. Tweak to taste.
voice:
  - direct
  - specific
  - warm
  - confident
  - earned-not-aggressive

avoid:
  - corporate jargon
  - hype words ("revolutionary", "next-generation", "unlock", "leverage", "synergy")
  - vague compliments ("loved your post", "amazing work")
  - "hope this finds you well"
  - emoji confetti
  - all-caps urgency

prefer:
  - one idea per message
  - one CTA per touch
  - active voice
  - present tense
  - concrete numbers over adjectives

length:
  email_max_sentences: 4
  email_max_words: 90
  call_intro_max_seconds: 12
  meeting_request_max_words: 25

formatting:
  use_em_dashes: true
  use_bullet_points: when the list has 3+ items
  use_subject_line_personalization: true
  use_signature: full name + one-line role; no logos, no banners
